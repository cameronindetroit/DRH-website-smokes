name: Playwright Tests

on:
  schedule:
    # Runs daily at 7:00 AM UTC (2:00 AM CDT)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - e2e
      browser:
        description: 'Browser to test on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

jobs:
  smoke:
    name: Smoke Tests (${{ inputs.browser || 'chromium' }})
    if: inputs.suite == 'all' || inputs.suite == 'smoke' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ inputs.browser != 'all' && inputs.browser || 'chromium' }}
      - run: mkdir -p src/config && touch src/config/.env.qa
      - name: Run smoke tests
        run: |
          BROWSER="${{ inputs.browser || 'chromium' }}"
          if [ "$BROWSER" = "all" ]; then
            npx playwright test src/tests/smoke
          else
            npx playwright test src/tests/smoke --project="$BROWSER"
          fi
        env:
          CI: true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ inputs.browser || 'chromium' }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  regression:
    name: Regression Tests (${{ inputs.browser || 'chromium' }})
    if: inputs.suite == 'all' || inputs.suite == 'regression' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ inputs.browser != 'all' && inputs.browser || 'chromium' }}
      - run: mkdir -p src/config && touch src/config/.env.qa
      - name: Run regression tests
        run: |
          BROWSER="${{ inputs.browser || 'chromium' }}"
          if [ "$BROWSER" = "all" ]; then
            npx playwright test src/tests/regression
          else
            npx playwright test src/tests/regression --project="$BROWSER"
          fi
        env:
          CI: true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ inputs.browser || 'chromium' }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  e2e:
    name: E2E Tests (${{ inputs.browser || 'chromium' }})
    if: inputs.suite == 'all' || inputs.suite == 'e2e' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ inputs.browser != 'all' && inputs.browser || 'chromium' }}
      - run: mkdir -p src/config && touch src/config/.env.qa
      - name: Run E2E tests
        run: |
          BROWSER="${{ inputs.browser || 'chromium' }}"
          if [ "$BROWSER" = "all" ]; then
            npx playwright test src/tests/e2e
          else
            npx playwright test src/tests/e2e --project="$BROWSER"
          fi
        env:
          CI: true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ inputs.browser || 'chromium' }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7
